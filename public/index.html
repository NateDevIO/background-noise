<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Noise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #141419;
    --surface: #1c1c24;
    --surface-hover: #24242f;
    --surface-active: #2a2a38;
    --text: #e0ddd8;
    --text-muted: #7a7774;
    --border: #2a2a34;
  }

  html { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.25rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 1rem 0 1.25rem;
    background: linear-gradient(var(--bg) 60%, transparent);
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 2.25rem;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 0.35rem;
  }

  header p {
    font-size: 0.8125rem;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .noise-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 1.5rem;
  }

  .category-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    padding: 1.25rem 0.5rem 0.5rem;
    opacity: 0.7;
    font-weight: 400;
  }

  .category-label:first-child {
    padding-top: 0;
  }

  .noise-option {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.2s, box-shadow 0.4s;
    -webkit-user-select: none;
    user-select: none;
  }

  .noise-option:hover { background: var(--surface-hover); }

  .noise-option.active {
    background: var(--surface-active);
    border-color: var(--accent);
  }

  .noise-option.active.glowing {
    box-shadow: 0 0 20px -4px var(--accent), 0 0 40px -8px var(--accent);
    animation: glow 3s ease-in-out infinite;
  }

  .noise-option.loading .dot {
    animation: loading-pulse 0.8s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px -4px var(--accent), 0 0 40px -8px var(--accent); }
    50% { box-shadow: 0 0 30px -2px var(--accent), 0 0 60px -4px var(--accent); }
  }

  @keyframes loading-pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.6;
    transition: opacity 0.2s, transform 0.2s;
  }

  .noise-option.active .dot { opacity: 1; transform: scale(1.3); }

  .info { flex: 1; min-width: 0; text-align: left; }

  .name {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    margin-bottom: 0.1rem;
  }

  .desc {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .char {
    font-size: 0.75rem;
    color: var(--text-muted);
    opacity: 0.6;
    font-style: italic;
    font-weight: 300;
    text-align: right;
    flex-shrink: 0;
  }

  .waveform-wrap {
    width: 100%;
    height: 48px;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }

  .waveform-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
    opacity: 0;
    transition: opacity 0.6s;
  }

  .waveform-wrap canvas.visible { opacity: 1; }

  .controls-bar {
    position: sticky;
    bottom: 0;
    background: linear-gradient(transparent, var(--bg) 30%);
    padding: 1.5rem 0 0.5rem;
    z-index: 10;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    padding: 0 0.25rem;
  }

  .play-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.2s, transform 0.1s;
  }

  .play-btn:hover { background: var(--surface-hover); border-color: var(--text-muted); }
  .play-btn:active { transform: scale(0.95); }
  .play-btn svg { width: 20px; height: 20px; fill: currentColor; }
  .play-btn .icon-pause { display: none; }
  .play-btn.playing .icon-play { display: none; }
  .play-btn.playing .icon-pause { display: block; }

  .volume-group { flex: 1; display: flex; flex-direction: column; gap: 0.35rem; }

  .volume-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text);
    border: none;
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text);
    border: none;
    cursor: pointer;
  }

  .shortcuts {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    opacity: 0.6;
    font-weight: 300;
    letter-spacing: 0.03em;
    padding-bottom: 0.5rem;
  }

  .shortcuts kbd {
    display: inline-block;
    padding: 0.1em 0.4em;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.9em;
    margin: 0 0.05em;
    background: var(--surface);
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.75rem; }
    .noise-option { padding: 0.7rem 0.875rem; }
  }
</style>
</head>
<body>

<script>
// ── Sound config ──
// Colors: generated algorithmically (dur = buffer seconds)
// Nature/Scenes/ASMR: real recordings from Moodist (MIT, Pixabay/CC0 audio)
const SOUNDS = {
  // Generated (color noises + heartbeat)
  brown:  { dur:4, rgb:[184,135,94] },
  white:  { dur:4, rgb:[212,207,200] },
  pink:   { dur:4, rgb:[201,135,159] },
  green:  { dur:4, rgb:[122,170,110] },
  blue:   { dur:4, rgb:[110,153,184] },
  violet: { dur:4, rgb:[141,127,181] },
  gray:   { dur:4, rgb:[138,138,138] },
  heartbeat: { dur:8, rgb:[181,114,114] },
  // File-based (real recordings served from /sounds/)
  rain:         { url: 'sounds/rain.mp3',         rgb:[107,143,163] },
  thunderstorm: { url: 'sounds/thunderstorm.mp3', rgb:[92,107,138] },
  ocean:        { url: 'sounds/ocean.mp3',        rgb:[91,157,173] },
  wind:         { url: 'sounds/wind.mp3',         rgb:[143,170,157] },
  stream:       { url: 'sounds/stream.mp3',       rgb:[110,170,181] },
  crickets:     { url: 'sounds/crickets.mp3',     rgb:[110,122,94] },
  campfire:     { url: 'sounds/campfire.mp3',     rgb:[196,120,74] },
  fan:          { url: 'sounds/fan.mp3',          rgb:[138,144,153] },
  airplane:     { url: 'sounds/airplane.mp3',     rgb:[122,133,153] },
  train:        { url: 'sounds/train.mp3',        rgb:[160,140,110] },
  laundromat:   { url: 'sounds/laundromat.mp3',   rgb:[122,150,160] },
  purr:         { url: 'sounds/purr.mp3',         rgb:[196,154,122] },
  keyboard:     { url: 'sounds/keyboard.mp3',     rgb:[154,154,128] },
};

// ── Noise generators (color noises only) ──
function whiteN(buf) { for(let i=0;i<buf.length;i++) buf[i]=Math.random()*2-1; }
function pinkN(buf) {
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<buf.length;i++){
    const w=Math.random()*2-1;
    b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;
    b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;
    b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;
    buf[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;
    b6=w*.115926;
  }
}
function brownN(buf) {
  let last=0;
  for(let i=0;i<buf.length;i++){last=(last+.02*(Math.random()*2-1))/1.02;buf[i]=last*3.5;}
}
function biquad(buf,sr,type,freq,Q) {
  const w=2*Math.PI*freq/sr,s=Math.sin(w),c=Math.cos(w),a=s/(2*Q);
  let b0,b1,b2;
  if(type==='lp'){b0=(1-c)/2;b1=1-c;b2=(1-c)/2;}
  else if(type==='hp'){b0=(1+c)/2;b1=-(1+c);b2=(1+c)/2;}
  else{b0=a;b1=0;b2=-a;}
  const a0=1+a,a1=-2*c,a2=1-a;
  let x1=0,x2=0,y1=0,y2=0;
  for(let i=0;i<buf.length;i++){
    const x=buf[i];
    buf[i]=(b0*x+b1*x1+b2*x2-a1*y1-a2*y2)/a0;
    x2=x1;x1=x;y2=y1;y1=buf[i];
  }
}
function norm(buf,peak=.75) {
  let mx=0;for(let i=0;i<buf.length;i++)mx=Math.max(mx,Math.abs(buf[i]));
  if(mx>0){const s=peak/mx;for(let i=0;i<buf.length;i++)buf[i]*=s;}
}

const gen = {
  brown(b) { brownN(b); },
  white(b) { whiteN(b); },
  pink(b)  { pinkN(b); },
  green(b,sr){ whiteN(b);biquad(b,sr,'bp',500,.7);norm(b); },
  blue(b){ let last=0;for(let i=0;i<b.length;i++){const w=Math.random()*2-1;b[i]=w-last;last=w;}norm(b); },
  violet(b){ let l1=0,l2=0;for(let i=0;i<b.length;i++){const w=Math.random()*2-1;const d=w-l1;b[i]=d-l2;l2=d;l1=w;}norm(b); },
  gray(b,sr){
    whiteN(b);const s=new Float32Array(b.length);
    const w0=2*Math.PI*1000/sr,al=Math.sin(w0),co=Math.cos(w0);
    const a0=1+al,b0n=al/a0,b2n=-al/a0,a1n=-2*co/a0,a2n=(1-al)/a0;
    let x1=0,x2=0,y1=0,y2=0;
    for(let i=0;i<b.length;i++){s[i]=b0n*b[i]+b2n*x2-a1n*y1-a2n*y2;x2=x1;x1=b[i];y2=y1;y1=s[i];}
    for(let i=0;i<b.length;i++) b[i]=b[i]*.7+s[i]*.5;
  },
  heartbeat(b,sr){
    for(let i=0;i<b.length;i++) b[i]=(Math.random()*2-1)*.008;
    const bi=Math.floor(sr*1.0);
    for(let pos=Math.floor(sr*.1);pos<b.length;pos+=bi){
      const lubL=Math.floor(sr*.1);
      for(let j=0;j<lubL&&pos+j<b.length;j++)
        b[pos+j]+=.8*Math.exp(-j/(lubL*.25))*Math.sin(2*Math.PI*50*j/sr);
      const ds=pos+Math.floor(sr*.22),dubL=Math.floor(sr*.08);
      for(let j=0;j<dubL&&ds+j<b.length;j++)
        b[ds+j]+=.5*Math.exp(-j/(dubL*.2))*Math.sin(2*Math.PI*65*j/sr);
    }
    biquad(b,sr,'lp',200,.7);norm(b,.65);
  },
};

// ── Audio engine ──
let audioCtx=null, masterGain=null, volGain=null, analyser=null;
let audioOut=null; // <audio> element for iOS media playback
let sourceNode=null, sourceGain=null;
let fadingSource=null, fadingGain=null;
let isPlaying=false, currentType='brown', loadingType=null;
const FADE=1.0;
const bufferCache={};

const playBtn=document.getElementById('playBtn');
const vol=document.getElementById('volume');
const noiseList=document.getElementById('noiseList');
const canvas=document.getElementById('waveform');
const ctx=canvas.getContext('2d');

function initAudio() {
  if(analyser) return; // already built
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  masterGain=audioCtx.createGain();
  masterGain.gain.value=1;
  volGain=audioCtx.createGain();
  volGain.gain.value=parseFloat(vol.value);
  masterGain.connect(analyser);
  analyser.connect(volGain);
  // Route through <audio> element so iOS treats output as media playback
  // (plays even with mute switch on, like YouTube/Spotify)
  if(audioCtx.createMediaStreamDestination) {
    const dest=audioCtx.createMediaStreamDestination();
    volGain.connect(dest);
    audioOut=new Audio();
    audioOut.srcObject=dest.stream;
    audioOut.play().catch(()=>{});
  } else {
    volGain.connect(audioCtx.destination);
  }
}

// Get or create audio buffer (async for file-based, sync-ish for generated)
async function getBuffer(type) {
  const cfg=SOUNDS[type];

  if(cfg.url) {
    // File-based: fetch, decode, cache
    if(bufferCache[type]) return bufferCache[type];
    const resp=await fetch(cfg.url);
    if(!resp.ok) throw new Error('Failed to load '+type);
    const arr=await resp.arrayBuffer();
    const buf=await audioCtx.decodeAudioData(arr);
    bufferCache[type]=buf;
    return buf;
  } else {
    // Generated: create fresh buffer each time for variety
    const sr=audioCtx.sampleRate, len=sr*cfg.dur;
    const buf=audioCtx.createBuffer(1,len,sr);
    const d=buf.getChannelData(0);
    gen[type](d,sr);
    // Crossfade ends for seamless loop
    const fl=Math.floor(sr*.05);
    for(let i=0;i<fl;i++){const t=i/fl;d[i]=d[i]*t+d[len-fl+i]*(1-t);}
    return buf;
  }
}

function kill(s,g){if(!s)return;try{s.stop();}catch(e){}s.disconnect();g.disconnect();}

function setLoading(type,on) {
  const opt=noiseList.querySelector(`.noise-option[data-type="${type}"]`);
  if(opt) opt.classList.toggle('loading',on);
  loadingType=on?type:null;
}

async function startNoise(xfade) {
  initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();

  const targetType=currentType;
  const needsLoad=SOUNDS[targetType].url&&!bufferCache[targetType];

  if(needsLoad) setLoading(targetType,true);

  let buffer;
  try {
    buffer=await getBuffer(targetType);
  } catch(e) {
    console.error('Failed to load sound:',e);
    setLoading(targetType,false);
    return;
  }

  setLoading(targetType,false);

  // If user switched away while loading, don't play stale sound
  if(currentType!==targetType) return;

  // Fade out old source
  kill(fadingSource,fadingGain);fadingSource=null;fadingGain=null;
  if(xfade&&sourceNode){
    fadingSource=sourceNode;fadingGain=sourceGain;
    fadingGain.gain.setValueAtTime(fadingGain.gain.value,audioCtx.currentTime);
    fadingGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+FADE);
    const fs=fadingSource,fg=fadingGain;
    setTimeout(()=>kill(fs,fg),FADE*1000+50);
  } else { kill(sourceNode,sourceGain); }

  // Create and start new source
  const g=audioCtx.createGain();g.connect(masterGain);
  const s=audioCtx.createBufferSource();s.buffer=buffer;s.loop=true;s.connect(g);s.start();
  sourceNode=s;sourceGain=g;

  if(xfade){
    sourceGain.gain.setValueAtTime(0,audioCtx.currentTime);
    sourceGain.gain.linearRampToValueAtTime(1,audioCtx.currentTime+FADE);
  } else { sourceGain.gain.value=1; }

  isPlaying=true;
  playBtn.classList.add('playing');playBtn.setAttribute('aria-label','Pause');
  setGlow(true);canvas.classList.add('visible');draw();
}

function pause() {
  kill(sourceNode,sourceGain);kill(fadingSource,fadingGain);
  sourceNode=null;sourceGain=null;fadingSource=null;fadingGain=null;
  isPlaying=false;
  playBtn.classList.remove('playing');playBtn.setAttribute('aria-label','Play');
  setGlow(false);canvas.classList.remove('visible');
}

function setGlow(on) {
  noiseList.querySelectorAll('.noise-option').forEach(el=>el.classList.remove('glowing'));
  if(on){const a=noiseList.querySelector('.noise-option.active');if(a)a.classList.add('glowing');}
}

// Preload file when user selects a sound (before they hit play)
function preload(type) {
  if(!audioCtx||!SOUNDS[type].url||bufferCache[type]) return;
  getBuffer(type).catch(()=>{});
}

// ── Waveform ──
function draw() {
  if(!isPlaying||!analyser) return;
  const dpr=window.devicePixelRatio||1,w=canvas.clientWidth,h=canvas.clientHeight;
  if(canvas.width!==w*dpr||canvas.height!==h*dpr){canvas.width=w*dpr;canvas.height=h*dpr;}
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const bl=analyser.frequencyBinCount,data=new Uint8Array(bl);
  analyser.getByteTimeDomainData(data);
  const c=SOUNDS[currentType].rgb;

  // Auto-scale: find peak deviation from center (128) and normalize
  let maxDev=0;
  for(let i=0;i<bl;i++) maxDev=Math.max(maxDev,Math.abs(data[i]-128));
  const scale=maxDev>1?60/maxDev:1; // normalize so peak fills ~60% of height

  ctx.clearRect(0,0,w,h);
  const sw=w/(bl-1);
  // Glow line
  ctx.beginPath();
  for(let i=0;i<bl;i++){const y=h/2+(data[i]-128)*scale*h/128;i===0?ctx.moveTo(0,y):ctx.lineTo(i*sw,y);}
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},.12)`;ctx.lineWidth=6;ctx.stroke();
  // Sharp line
  ctx.beginPath();
  for(let i=0;i<bl;i++){const y=h/2+(data[i]-128)*scale*h/128;i===0?ctx.moveTo(0,y):ctx.lineTo(i*sw,y);}
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},.55)`;ctx.lineWidth=1.5;ctx.stroke();
  requestAnimationFrame(draw);
}

// ── UI ──
function selectOption(opt) {
  noiseList.querySelectorAll('.noise-option').forEach(el=>{el.classList.remove('active','glowing','loading');});
  opt.classList.add('active');
  currentType=opt.dataset.type;
  if(isPlaying){setGlow(true);startNoise(true);}
  else{preload(currentType);startNoise(false);}
}

playBtn.addEventListener('click',()=>isPlaying?pause():startNoise(false));

noiseList.addEventListener('click',e=>{
  const opt=e.target.closest('.noise-option');
  if(opt) selectOption(opt);
});

vol.addEventListener('input',()=>{if(volGain) volGain.gain.value=parseFloat(vol.value);});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();isPlaying?pause():startNoise(false);}
  if(e.code==='ArrowUp'||e.code==='ArrowDown'){
    e.preventDefault();
    const opts=[...noiseList.querySelectorAll('.noise-option')];
    const idx=opts.findIndex(el=>el.classList.contains('active'));
    let next=e.code==='ArrowUp'?idx-1:idx+1;
    if(next<0)next=opts.length-1;if(next>=opts.length)next=0;
    selectOption(opts[next]);
    opts[next].scrollIntoView({block:'nearest',behavior:'smooth'});
  }
});
</script>

</body>
</html>
